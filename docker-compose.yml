services:
  numbers-game:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: numbers-game-server
    ports:
      - "3210:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000', timeout=3).getcode()==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
