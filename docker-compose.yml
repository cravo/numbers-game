services:
  numbers-game:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: numbers-game-server
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-5000}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    ports:
      - "${HOST_PORT:-3210}:${PORT:-5000}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,urllib.request; port=os.getenv('PORT', '5000'); sys.exit(0 if urllib.request.urlopen(f'http://127.0.0.1:{port}/healthz', timeout=3).getcode()==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    cpus: "0.50"
    mem_limit: 256m
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
